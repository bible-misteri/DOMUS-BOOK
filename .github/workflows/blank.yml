name: Build DOMUS Professional PDF

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc & LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-latex-extra

      - name: Create output folder
        run: mkdir -p output

      - name: Build PDF from all chapters
        run: |
          pandoc $(find chapters -name "*.md" | sort) \
            -o output/DOMUS.pdf \
            --pdf-engine=xelatex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOMUS-PDF
          path: output/DOMUS.pdf
