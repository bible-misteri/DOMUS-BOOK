name: DOMUS Multi-Book Publisher v5

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Pandoc + XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            jq

      - name: Create Folders
        run: |
          mkdir -p output
          mkdir -p release

      - name: Build Books
        run: |
          echo '{ "books": [' > library.json
          FIRST=true

          for BOOK in books/DOMUS-Book-*; do
            [ -d "$BOOK" ] || continue

            NAME=$(basename "$BOOK")

            echo "Building $NAME"

            pandoc \
              "$BOOK/00-prolog.md" \
              "$BOOK/01-pendahuluan.md" \
              "$BOOK"/chapters/*.md \
              --toc \
              --number-sections \
              --pdf-engine=xelatex \
              -V geometry:margin=2.5cm \
              -V documentclass=report \
              -o "output/$NAME.pdf"

            pandoc \
              "$BOOK/00-prolog.md" \
              "$BOOK/01-pendahuluan.md" \
              "$BOOK"/chapters/*.md \
              -o "output/$NAME.epub"

            if [ "$FIRST" = false ]; then
              echo "," >> library.json
            fi
            FIRST=false

            echo "{
              \"title\": \"$NAME\",
              \"pdf\": \"output/$NAME.pdf\",
              \"epub\": \"output/$NAME.epub\"
            }" >> library.json

          done

          echo ']}' >> library.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: domus-library
          name: DOMUS Digital Library
          files: |
            output/*.pdf
            output/*.epub
            library.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
