name: DOMUS Professional Publisher

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc & LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-latex-extra

      - name: Create output folder
        run: mkdir -p output

      - name: Build PDF
        run: |
          pandoc \
            00-prolog.md \
            01-pendahuluan.md \
            chapters/*.md \
            --toc \
            --number-sections \
            --pdf-engine=xelatex \
            -V geometry:margin=2.5cm \
            -V documentclass=report \
            -V fontsize=12pt \
            -o output/DOMUS.pdf

      - name: Get version tag
        id: tag
        run: echo "tag=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release + Upload PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: DOMUS PDF ${{ steps.tag.outputs.tag }}
          files: output/DOMUS.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
