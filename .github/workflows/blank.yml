name: DOMUS Multi-Book Publisher v4

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc & LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-latex-extra jq

      - name: Create output folder
        run: mkdir -p output release

      # =========================
      # 📚 BUILD BOOK 1
      # =========================
      - name: Build DOMUS Book 1
        run: |
          pandoc \
            00-prolog.md \
            01-pendahuluan.md \
            chapters/*.md \
            --toc \
            --number-sections \
            --pdf-engine=xelatex \
            -V geometry:margin=2.5cm \
            -V documentclass=report \
            -o output/DOMUS-Book-1.pdf

          pandoc \
            00-prolog.md \
            01-pendahuluan.md \
            chapters/*.md \
            -o output/DOMUS-Book-1.epub

      # =========================
      # 📚 BUILD BOOK 2
      # =========================
      - name: Build DOMUS Book 2
        run: |
          pandoc \
            books/DOMUS-Book-2/00-prolog.md \
            books/DOMUS-Book-2/01-pendahuluan.md \
            books/DOMUS-Book-2/chapters/*.md \
            --toc \
            --number-sections \
            --pdf-engine=xelatex \
            -V geometry:margin=2.5cm \
            -V documentclass=report \
            -o output/DOMUS-Book-2.pdf

          pandoc \
            books/DOMUS-Book-2/00-prolog.md \
            books/DOMUS-Book-2/01-pendahuluan.md \
            books/DOMUS-Book-2/chapters/*.md \
            -o output/DOMUS-Book-2.epub

      # =========================
      # 📚 AUTO LIBRARY INDEX
      # =========================
      - name: Generate Library Index
        run: |
          echo '{
            "books": [
              {
                "title": "DOMUS Book 1",
                "pdf": "release/DOMUS-Book-1.pdf",
                "epub": "release/DOMUS-Book-1.epub"
              },
              {
                "title": "DOMUS Book 2",
                "pdf": "release/DOMUS-Book-2.pdf",
                "epub": "release/DOMUS-Book-2.epub"
              }
            ]
          }' > library.json

      # =========================
      # 📦 RELEASE BOOK 1
      # =========================
      - name: Release Book 1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-book1
          name: DOMUS Book 1
          files: |
            output/DOMUS-Book-1.pdf
            output/DOMUS-Book-1.epub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # 📦 RELEASE BOOK 2
      # =========================
      - name: Release Book 2
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-book2
          name: DOMUS Book 2
          files: |
            output/DOMUS-Book-2.pdf
            output/DOMUS-Book-2.epub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # 📚 UPLOAD LIBRARY INDEX
      # =========================
      - name: Upload Library Index
        uses: softprops/action-gh-release@v2
        with:
          tag_name: library-index
          name: DOMUS Library Index
          files: library.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
