name: DOMUS Multi-Book Publisher v6 (Stable)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            jq

      - name: Prepare Output
        run: |
          rm -rf output library.json
          mkdir -p output

      - name: Show Repository Structure
        run: |
          echo "===== ROOT ====="
          ls -lah
          echo ""
          echo "===== BOOKS ====="
          find books -type f | sort

      - name: Build Books Safely
        run: |
          echo '{ "books": [' > library.json
          FIRST=true

          for BOOK in books/DOMUS-Book-*; do
            [ -d "$BOOK" ] || continue

            NAME=$(basename "$BOOK")
            echo ""
            echo "=============================="
            echo "Building: $NAME"
            echo "=============================="

            PROLOG="$BOOK/00-prolog.md"
            INTRO="$BOOK/01-pendahuluan.md"
            CHAPTERS="$BOOK/chapters/*.md"

            # VALIDASI FILE WAJIB
            if [ ! -f "$PROLOG" ] || [ ! -f "$INTRO" ]; then
              echo "❌ SKIP $NAME (missing prolog/intro)"
              continue
            fi

            if ! ls $CHAPTERS 1> /dev/null 2>&1; then
              echo "❌ SKIP $NAME (no chapters)"
              continue
            fi

            # BUILD PDF
            if ! pandoc \
              "$PROLOG" \
              "$INTRO" \
              $CHAPTERS \
              --toc \
              --number-sections \
              --pdf-engine=xelatex \
              -V geometry:margin=2.5cm \
              -V documentclass=report \
              -o "output/$NAME.pdf"
            then
              echo "❌ PDF FAILED: $NAME"
              continue
            fi

            # BUILD EPUB
            if ! pandoc \
              "$PROLOG" \
              "$INTRO" \
              $CHAPTERS \
              -o "output/$NAME.epub"
            then
              echo "❌ EPUB FAILED: $NAME"
              continue
            fi

            # ADD TO LIBRARY.JSON
            if [ "$FIRST" = false ]; then
              echo "," >> library.json
            fi
            FIRST=false

            echo "{
              \"title\": \"$NAME\",
              \"pdf\": \"output/$NAME.pdf\",
              \"epub\": \"output/$NAME.epub\"
            }" >> library.json

            echo "✔ DONE: $NAME"
          done

          echo ']}' >> library.json

      - name: Validate Output (Stop Empty Release)
        run: |
          COUNT=$(ls output 2>/dev/null | wc -l)

          echo "Generated files: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No output generated. Stop release."
            exit 1
          fi

          ls -lah output

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: domus-library
          name: DOMUS Digital Library v6
          files: |
            output/**
            library.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
