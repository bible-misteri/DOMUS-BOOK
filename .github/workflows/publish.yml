name: DOMUS Publisher v9.0

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Pandoc + XeLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            fonts-dejavu \
            jq

      - name: Verify Build Environment
        run: |
          echo "=================================="
          echo "DOMUS Build Environment"
          echo "=================================="
          echo ""
          echo "Pandoc Version:"
          pandoc --version | head -n 2
          echo ""
          echo "XeLaTeX Version:"
          xelatex --version | head -n 2
          echo ""
          echo "Environment Ready."

      - name: Show Repository Structure
        run: |
          echo "=================================="
          echo "DOMUS Publisher v9.0"
          echo "=================================="
          echo ""
          echo "Repository Root:"
          ls -lah
          echo ""
          echo "Books:"
          find books -maxdepth 2 -type d | sort

      - name: Validate Books Folder
        run: |
          if [ ! -d "books" ]; then
            echo "ERROR: books folder not found."
            exit 1
          fi 

      - name: Run DOMUS Builder
        run: |
          chmod +x scripts/build-book.sh
          ./scripts/build-book.sh

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOMUS-Debug
          path: output/

      - name: Validate Build
        run: |
          COUNT=$(find books -maxdepth 1 -type d -name "DOMUS-Book-*" | wc -l)

          echo "Books detected: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No DOMUS books found."
            exit 1
          fi

          echo "Repository validation successful."
