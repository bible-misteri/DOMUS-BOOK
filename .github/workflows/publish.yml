name: DOMUS Publisher v10

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build DOMUS Library
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Pandoc + XeLaTeX
        run: |
          sudo apt-get install -y \
          pandoc \
          texlive-xetex \
          texlive-latex-extra \
          fonts-dejavu \
          jq \
          yq

      - name: Install PyYAML
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      - name: Verify Build Environment
        run: |
          echo "=================================="
          echo "DOMUS Build Environment"
          echo "=================================="

          echo
          pandoc --version | head -n 2

          echo
          xelatex --version | head -n 2

      - name: Show Repository Structure
        run: |
          echo "=================================="
          echo "Repository"
          echo "=================================="

          ls -lah

          echo
          find books -maxdepth 2 -type d | sort

      - name: Validate Books Folder
        run: |
          if [ ! -d books ]; then
            echo "Books folder not found."
            exit 1
          fi

      - name: Run DOMUS Builder
        run: |
          chmod +x scripts/build-book.sh
          ./scripts/build-book.sh

      - name: Verify Generated PDF
        run: |
          echo "=================================="
          echo "Generated PDF"
          echo "=================================="

          find books -name "*.pdf"

          echo
          ls -lh books/DOMUS-ISAACI/output/

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOMUS-PDF
          path: |
              books/**/output/*.pdf
              books/**/output/*.epub

      - name: Upload Debug Files
        uses: actions/upload-artifact@v4
        with:
           name: DOMUS-Debug
           path: |
              books/**/output/debug.tex
              books/**/output/pandoc.log

      - name: Download PDF Artifact
        uses: actions/download-artifact@v4
        with:
          name: DOMUS-PDF
          path: release

      - name: Publish DOMUS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: domus-v10
          name: DOMUS Digital Library v10
          make_latest: true
          body: |
            DOMUS Publisher v10

            Automatic build by GitHub Actions.

            Assets:
            • DOMUS-ISAACI.pdf
          files: |
            release/**/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Build
        run: |
          COUNT=$(find books -maxdepth 1 -mindepth 1 -type d | wc -l)

          echo "Books detected: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No books found."
            exit 1
          fi

          echo "Repository validation successful."
